# Plantilla HTTP inicial (ANTES de certbot). No redirige a HTTPS.
# Generada por: deploy/scripts/setup-domain.sh
# Tras certbot --nginx, Certbot añade el bloque 443 y la redirección.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    root __WEB_ROOT__;
    index index.php;

    client_max_body_size 32M;

    access_log /var/log/nginx/joyeria-access.log;
    error_log  /var/log/nginx/joyeria-error.log;

    location ~* \.(css|js|jpg|jpeg|png|gif|webp|ico|svg|woff2?|ttf)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /admin {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    # Antes de location ~ \.php$ (^~ y extensiones); si no, PHP atiende admin/tests/*.php
    location ^~ /uploads/tmp/ {
        deny all;
        return 404;
    }

    location ^~ /admin/tests/ {
        deny all;
        return 404;
    }

    location ~* \.(log|sql|bak|dump|env)$ {
        deny all;
        return 404;
    }

    location ~ ^/(vendor|sql|deploy|print-agent|print-agent-etiquetas|\.env) {
        deny all;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:__PHP_FPM_SOCK__;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
